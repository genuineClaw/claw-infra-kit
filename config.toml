# OpenClaw GitHub Webhook Configuration

[webhook]
# Secret for GitHub webhook signature verification
secret = "CHANGE_ME_TO_SECURE_RANDOM_STRING"
# Port to listen on
port = 8080
# Only accept requests from GitHub IP ranges
github_ips_only = true

[openclaw]
# OpenClaw gateway endpoint
endpoint = "http://localhost:3000"
# Agent to spawn for handling issues
agent_id = "coder"
# Session runtime
runtime = "subagent"
# Mode: "run" for one-shot tasks
mode = "run"

[github]
# Authorized user who can trigger the agent
authorized_user = "pkuGenuine"
# Assistant's GitHub account (the mention to watch for)
assistant_account = "genuineClaw"
# Repositories to watch (webhooks should be configured on these)
watched_repos = [
    "genuineClaw/lspyc",
    "genuineClaw/CodeRetrX",
]